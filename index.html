<!DOCTYPE html>
<html lang="sw" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#15803d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Duka"/>
<link rel="manifest" href="./manifest.json"/>
<title>Mfumo wa Duka</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --green-50:#f0fdf4; --green-100:#dcfce7; --green-200:#bbf7d0;
  --green-500:#22c55e; --green-600:#16a34a; --green-700:#15803d;
  --green-800:#166534; --green-900:#14532d; --green-950:#052e16;

  --slate-50:#f8fafc; --slate-100:#f1f5f9; --slate-200:#e2e8f0;
  --slate-300:#cbd5e1; --slate-400:#94a3b8; --slate-500:#64748b;
  --slate-600:#475569; --slate-700:#334155; --slate-800:#1e293b;
  --slate-900:#0f172a; --slate-950:#020617;

  --amber-400:#fbbf24; --amber-500:#f59e0b; --amber-600:#d97706;
  --amber-50:#fffbeb; --amber-100:#fef3c7;

  --red-400:#f87171; --red-500:#ef4444; --red-600:#dc2626;
  --red-50:#fef2f2; --red-100:#fee2e2;

  --blue-500:#3b82f6; --blue-600:#2563eb;
  --blue-50:#eff6ff; --blue-100:#dbeafe;

  --purple-500:#a855f7; --purple-600:#9333ea;
  --purple-50:#faf5ff; --purple-100:#f3e8ff;

  /* Semantic */
  --bg:var(--slate-50);
  --bg2:var(--slate-100);
  --surface:#ffffff;
  --surface2:var(--slate-50);
  --surface3:var(--slate-100);
  --border:var(--slate-200);
  --border2:var(--slate-300);
  --text:var(--slate-900);
  --text2:var(--slate-600);
  --text3:var(--slate-400);
  --brand:var(--green-600);
  --brand-dark:var(--green-800);
  --brand-deeper:var(--green-950);
  --brand-light:var(--green-100);
  --shadow-xs:0 1px 2px rgba(0,0,0,.05);
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
  --shadow-md:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -4px rgba(0,0,0,.05);
  --shadow-lg:0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.05);
  --shadow-xl:0 25px 50px -12px rgba(0,0,0,.18);
  --r:12px; --r-sm:8px; --r-md:14px; --r-lg:18px; --r-xl:22px; --r-2xl:28px;
  --sidebar-w:256px;
  --header-h:60px;
}

[data-theme="dark"] {
  --bg:#0a0e0b; --bg2:#0f1610; --surface:#111a12; --surface2:#162118; --surface3:#1c2a1e;
  --border:#1e3024; --border2:#2a4030;
  --text:#ecfdf5; --text2:#86efac; --text3:#4ade80;
  --brand:var(--green-500); --brand-dark:var(--green-600);
  --brand-light:rgba(34,197,94,.12);
  --shadow-xs:0 1px 2px rgba(0,0,0,.4);
  --shadow-sm:0 1px 3px rgba(0,0,0,.5);
  --shadow:0 4px 6px rgba(0,0,0,.4);
  --shadow-md:0 10px 15px rgba(0,0,0,.5);
  --shadow-lg:0 20px 40px rgba(0,0,0,.6);
  --shadow-xl:0 25px 50px rgba(0,0,0,.7);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;height:100%;overscroll-behavior-y:none}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100%;font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
#root{min-height:100vh;display:flex;flex-direction:column}
button,input,select,textarea{font-family:inherit;font-size:inherit}
a{color:inherit;text-decoration:none}
img,svg{display:block}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:9px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ═══════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-1000px 0}100%{background-position:1000px 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes bounce-in{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.9)}100%{transform:scale(1);opacity:1}}

.anim-fade{animation:fadeIn .25s ease both}
.anim-up{animation:fadeUp .3s cubic-bezier(.22,1,.36,1) both}
.anim-scale{animation:scaleIn .2s cubic-bezier(.22,1,.36,1) both}

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.shell{display:flex;height:100vh;overflow:hidden;position:relative}
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--green-950);
  display:flex;flex-direction:column;
  height:100%;overflow:hidden;
  transition:transform .3s cubic-bezier(.22,1,.36,1);
  z-index:200;position:relative;
}
[data-theme="dark"] .sidebar{background:#050d07;border-right:1px solid var(--border)}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  height:var(--header-h);flex-shrink:0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 20px;gap:12px;
  position:sticky;top:0;z-index:50;
}
.page{flex:1;overflow-y:auto;padding:28px 24px;scroll-behavior:smooth}

/* ═══════════════════════════════════════════
   SIDEBAR PARTS
═══════════════════════════════════════════ */
.sb-brand{padding:20px 18px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-brand-icon{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--green-600),var(--green-500));
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(22,163,74,.4);
}
.sb-brand-name{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.2}
.sb-brand-tagline{font-size:11px;color:rgba(134,239,172,.6);font-weight:500;margin-top:1px}

.sb-user{
  margin:12px 12px 6px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.06);
  border-radius:var(--r);padding:12px;
  display:flex;align-items:center;gap:10px;
}
.sb-avatar{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:15px;color:#fff;flex-shrink:0;
}
.sb-user-name{font-size:13px;font-weight:700;color:#fff;line-height:1.2}
.sb-user-role{font-size:11px;color:rgba(134,239,172,.7);font-weight:500;margin-top:2px}
.sb-online{display:flex;align-items:center;gap:4px;margin-top:3px}
.sb-online-dot{width:6px;height:6px;border-radius:50%;background:var(--green-500);animation:pulse 2s infinite}
.sb-online-text{font-size:10px;color:rgba(134,239,172,.5)}

.sb-section-label{
  padding:14px 18px 5px;
  font-size:10px;font-weight:700;letter-spacing:.1em;
  color:rgba(134,239,172,.35);text-transform:uppercase;
}
.sb-nav{flex:1;overflow-y:auto;padding:0 10px;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}

.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:var(--r-sm);
  border:none;background:transparent;
  color:rgba(255,255,255,.5);font-size:13.5px;font-weight:500;
  cursor:pointer;transition:all .15s;text-align:left;width:100%;
  margin-bottom:1px;position:relative;
}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{
  background:linear-gradient(135deg,rgba(22,163,74,.35),rgba(22,163,74,.2));
  color:#fff;font-weight:600;
  box-shadow:inset 0 0 0 1px rgba(34,197,94,.2);
}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:18px;background:var(--green-400);border-radius:0 3px 3px 0;
}
.nav-icon{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
  background:rgba(255,255,255,.05);transition:background .15s;
}
.nav-item.active .nav-icon{background:rgba(34,197,94,.2)}
.nav-label{flex:1}
.nav-badge{
  min-width:18px;height:18px;padding:0 5px;
  border-radius:9px;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}

.sb-footer{padding:10px;border-top:1px solid rgba(255,255,255,.05)}
.sb-footer-btn{
  display:flex;align-items:center;gap:8px;
  padding:9px 10px;border-radius:var(--r-sm);
  border:none;background:transparent;
  color:rgba(255,255,255,.4);font-size:12.5px;font-weight:500;
  cursor:pointer;transition:all .15s;width:100%;text-align:left;
  margin-bottom:1px;
}
.sb-footer-btn:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.7)}
.sb-footer-btn.danger:hover{color:#fca5a5}

/* ═══════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════ */
.tb-title{flex:1}
.tb-title h1{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.tb-title p{font-size:11px;color:var(--text3);margin-top:1px}
.tb-actions{display:flex;align-items:center;gap:8px}
.icon-btn{
  width:36px;height:36px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--surface);
  color:var(--text2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;font-size:16px;flex-shrink:0;
}
.icon-btn:hover{background:var(--surface3);border-color:var(--border2);color:var(--text)}
.hamburger{display:none}

/* ═══════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:var(--r-sm);
  border:none;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;white-space:nowrap;
  line-height:1;
}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
.btn-primary{
  background:var(--brand);color:#fff;
  box-shadow:0 1px 3px rgba(22,163,74,.3),inset 0 1px 0 rgba(255,255,255,.1);
}
.btn-primary:hover{background:var(--green-700);box-shadow:0 2px 6px rgba(22,163,74,.4)}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{background:var(--surface3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface2);border-color:var(--border2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid transparent}
.btn-ghost:hover{background:var(--surface3);color:var(--text)}
.btn-danger{background:var(--red-50);color:var(--red-600);border:1px solid #fecaca}
.btn-danger:hover{background:var(--red-100)}
.btn-warning{background:var(--amber-50);color:var(--amber-600);border:1px solid #fde68a}
.btn-info{background:var(--blue-50);color:var(--blue-600);border:1px solid #bfdbfe}
.btn-info:hover{background:var(--blue-100)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;gap:4px}
.btn-lg{padding:11px 20px;font-size:14px;border-radius:var(--r);font-weight:700}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;font-size:14px;border-radius:7px}
[data-theme="dark"] .btn-danger{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:#fca5a5}
[data-theme="dark"] .btn-info{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.2);color:#93c5fd}

/* ═══════════════════════════════════════════
   BADGES
═══════════════════════════════════════════ */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:20px;
  font-size:11.5px;font-weight:600;line-height:1.4;
}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge-green{background:var(--green-100);color:var(--green-800)}
.badge-green::before{background:var(--green-500)}
.badge-red{background:var(--red-100);color:var(--red-600)}
.badge-red::before{background:var(--red-500)}
.badge-amber{background:var(--amber-100);color:var(--amber-600)}
.badge-amber::before{background:var(--amber-500)}
.badge-blue{background:var(--blue-100);color:var(--blue-600)}
.badge-blue::before{background:var(--blue-500)}
.badge-purple{background:var(--purple-100);color:var(--purple-600)}
.badge-purple::before{background:var(--purple-500)}
.badge-gray{background:var(--surface3);color:var(--text2)}
.badge-gray::before{background:var(--text3)}
[data-theme="dark"] .badge-green{background:rgba(34,197,94,.12);color:#86efac}
[data-theme="dark"] .badge-red{background:rgba(239,68,68,.12);color:#fca5a5}
[data-theme="dark"] .badge-amber{background:rgba(245,158,11,.12);color:#fcd34d}
[data-theme="dark"] .badge-blue{background:rgba(59,130,246,.12);color:#93c5fd}
[data-theme="dark"] .badge-purple{background:rgba(168,85,247,.12);color:#d8b4fe}

/* ═══════════════════════════════════════════
   STAT CARDS
═══════════════════════════════════════════ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:14px;margin-bottom:24px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:20px;
  box-shadow:var(--shadow-xs);
  transition:transform .2s,box-shadow .2s;
  cursor:default;position:relative;overflow:hidden;
}
.stat-card::after{
  content:'';position:absolute;top:0;right:0;
  width:80px;height:80px;border-radius:50%;
  transform:translate(20px,-20px);
  opacity:.06;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-card-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;margin-bottom:14px;position:relative;z-index:1;
}
.stat-card-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.stat-card-value{font-size:21px;font-weight:800;color:var(--text);letter-spacing:-.03em;line-height:1}
.stat-card-sub{font-size:12px;color:var(--text3);margin-top:5px;display:flex;align-items:center;gap:4px}
.stat-card-trend{font-size:11px;font-weight:600;padding:1px 6px;border-radius:5px;margin-left:auto}
.trend-up{background:var(--green-100);color:var(--green-700)}
.trend-down{background:var(--red-100);color:var(--red-600)}
[data-theme="dark"] .trend-up{background:rgba(34,197,94,.12);color:#86efac}
[data-theme="dark"] .trend-down{background:rgba(239,68,68,.12);color:#fca5a5}

/* ═══════════════════════════════════════════
   SECTION HEADER
═══════════════════════════════════════════ */
.section-top{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:20px;gap:12px;flex-wrap:wrap;
}
.section-title-block h2{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.02em}
.section-title-block p{font-size:12px;color:var(--text3);margin-top:2px}
.section-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ═══════════════════════════════════════════
   TABLE
═══════════════════════════════════════════ */
.table-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden;
  box-shadow:var(--shadow-xs);
}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2)}
thead th{
  padding:10px 16px;text-align:left;
  font-size:11px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.06em;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
thead th:first-child{padding-left:20px}
thead th:last-child{padding-right:20px;text-align:right}
tbody tr{transition:background .1s;border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:13px 16px;font-size:13.5px;color:var(--text);vertical-align:middle}
tbody td:first-child{padding-left:20px}
tbody td:last-child{padding-right:20px;text-align:right}
tfoot td{
  padding:12px 16px;font-size:13px;font-weight:700;
  background:var(--surface2);border-top:2px solid var(--border2);
  color:var(--text);
}
tfoot td:first-child{padding-left:20px}
tfoot td:last-child{padding-right:20px;text-align:right}
.td-right{text-align:right!important}
.td-center{text-align:center!important}
.td-mono{font-family:ui-monospace,monospace;font-size:12px}
.td-fw{font-weight:700}
.td-muted{color:var(--text3);font-size:12.5px}

/* ═══════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════ */
.search{position:relative}
.search-input{
  width:100%;padding:8px 12px 8px 36px;
  border:1px solid var(--border);border-radius:var(--r-sm);
  background:var(--surface);color:var(--text);font-size:13px;
  outline:none;transition:all .15s;min-width:180px;
}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(22,163,74,.1)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:14px}

/* ═══════════════════════════════════════════
   MOBILE CARDS
═══════════════════════════════════════════ */
.m-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-md);padding:15px;
  box-shadow:var(--shadow-xs);margin-bottom:10px;
  transition:box-shadow .15s;
}
.m-card:active{box-shadow:var(--shadow)}
.m-card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.m-card-title{font-size:14px;font-weight:700;color:var(--text)}
.m-card-sub{font-size:11.5px;color:var(--text3);margin-top:2px}
.m-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.m-card-field{background:var(--surface2);border-radius:var(--r-sm);padding:9px 11px}
.m-card-field-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.m-card-field-value{font-size:14px;font-weight:700;color:var(--text)}
.m-card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:11px;border-top:1px solid var(--border)}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;
  display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .2s ease;
  backdrop-filter:blur(2px);
}
@media(min-width:640px){.overlay{align-items:center;padding:24px}}
.modal{
  background:var(--surface);width:100%;max-width:500px;
  border-radius:var(--r-2xl) var(--r-2xl) 0 0;
  max-height:94vh;overflow-y:auto;overscroll-behavior:contain;
  animation:fadeUp .25s cubic-bezier(.22,1,.36,1);
  box-shadow:var(--shadow-xl);
}
@media(min-width:640px){.modal{border-radius:var(--r-xl)}}
.modal-header{
  padding:20px 20px 16px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.modal-title{font-size:16px;font-weight:800;color:var(--text)}
.modal-body{padding:20px}
.modal-footer{
  padding:14px 20px;border-top:1px solid var(--border);
  display:flex;gap:10px;justify-content:flex-end;
  position:sticky;bottom:0;background:var(--surface);
}
.close-btn{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:all .15s;
}
.close-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border2)}

/* ═══════════════════════════════════════════
   FORM FIELDS
═══════════════════════════════════════════ */
.field{margin-bottom:15px}
.field:last-child{margin-bottom:0}
.field-label{
  display:block;font-size:11.5px;font-weight:700;
  color:var(--text2);margin-bottom:6px;
  text-transform:uppercase;letter-spacing:.05em;
}
.field-input{
  width:100%;padding:10px 13px;
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  background:var(--surface);color:var(--text);font-size:13.5px;
  outline:none;transition:all .15s;
}
.field-input::placeholder{color:var(--text3)}
.field-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(22,163,74,.1),0 0 0 1px var(--brand)}
.field-input:disabled{background:var(--surface3);color:var(--text3);cursor:not-allowed}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.field-hint{font-size:11px;color:var(--text3);margin-top:4px}
.field-error{font-size:11px;color:var(--red-500);margin-top:4px;display:flex;align-items:center;gap:4px}

.calc-box{
  background:linear-gradient(135deg,var(--green-50),#fff);
  border:1px solid var(--green-200);border-radius:var(--r);
  padding:13px 15px;margin-bottom:15px;
  display:flex;flex-wrap:wrap;gap:16px;
}
[data-theme="dark"] .calc-box{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.15)}
.calc-item{font-size:12.5px;color:var(--text2)}
.calc-item strong{color:var(--text);font-weight:700;font-size:14px}
.calc-item.profit strong{color:var(--green-600)}
.calc-item.loss strong{color:var(--red-500)}

/* ═══════════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════════ */
.progress{background:var(--border);border-radius:99px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.22,1,.36,1)}

/* ═══════════════════════════════════════════
   CHART
═══════════════════════════════════════════ */
.chart-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:22px;
  box-shadow:var(--shadow-xs);margin-bottom:24px;
}
.chart-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.chart-title{font-size:14px;font-weight:700;color:var(--text)}
.chart-sub{font-size:12px;color:var(--text3);margin-top:2px}
.chart-legend{display:flex;gap:12px;align-items:center}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-label{font-size:11px;color:var(--text3);font-weight:500}
.bars{display:flex;align-items:flex-end;gap:8px;height:110px;padding-bottom:4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.bar-val{font-size:9px;color:var(--text3);font-weight:600;text-align:center;min-height:12px}
.bar-body{width:100%;border-radius:5px 5px 0 0;transition:height .6s cubic-bezier(.22,1,.36,1);cursor:pointer}
.bar-body:hover{filter:brightness(1.1)}
.bar-label{font-size:10px;color:var(--text3);font-weight:600;text-align:center}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
.toast-stack{position:fixed;top:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:320px}
.toast{
  background:var(--slate-900);color:var(--slate-50);
  padding:11px 15px;border-radius:var(--r);
  font-size:13px;font-weight:600;
  box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:9px;
  pointer-events:all;animation:fadeUp .2s ease;
  border-left:3px solid transparent;
}
.toast.success{background:var(--green-900);color:var(--green-100);border-color:var(--green-500)}
.toast.error{background:#450a0a;color:#fee2e2;border-color:var(--red-500)}
.toast.info{background:#0c1a4a;color:#dbeafe;border-color:var(--blue-500)}
.toast.warning{background:#431407;color:#fef3c7;border-color:var(--amber-500)}
[data-theme="dark"] .toast.success{background:rgba(34,197,94,.15);border-color:var(--green-400)}

/* ═══════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════ */
.empty{text-align:center;padding:60px 24px}
.empty-emoji{font-size:44px;margin-bottom:14px;opacity:.5;line-height:1}
.empty-title{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:5px}
.empty-sub{font-size:13px;color:var(--text3);max-width:260px;margin:0 auto}

/* ═══════════════════════════════════════════
   RECEIPT
═══════════════════════════════════════════ */
.receipt{
  background:#fff;color:#111;
  font-family:'Courier New',monospace;
  padding:22px;border-radius:var(--r);
  font-size:13px;line-height:1.9;
  max-width:300px;margin:0 auto;
  border:1px solid #ddd;
}
.receipt-header{text-align:center;margin-bottom:12px;padding-bottom:12px;border-bottom:2px dashed #aaa}
.receipt-shop{font-size:16px;font-weight:900;letter-spacing:.05em}
.receipt-row{display:flex;justify-content:space-between}
.receipt-divider{border:none;border-top:1px dashed #aaa;margin:10px 0}
.receipt-total{font-size:15px;font-weight:900}
.receipt-footer{text-align:center;margin-top:12px;padding-top:12px;border-top:2px dashed #aaa;font-size:11px}

/* ═══════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════ */
.login-bg{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(160deg,var(--green-950) 0%,var(--green-900) 35%,var(--green-800) 65%,var(--green-700) 100%);
  position:relative;overflow:hidden;
}
.login-bg::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 80%,rgba(34,197,94,.12) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(134,239,172,.06) 0%,transparent 50%);
}
.login-card{
  background:var(--surface);border-radius:var(--r-2xl);
  padding:40px 36px;width:100%;max-width:400px;
  box-shadow:var(--shadow-xl);position:relative;z-index:1;
  border:1px solid rgba(255,255,255,.08);
  animation:scaleIn .35s cubic-bezier(.22,1,.36,1);
}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo-wrap{
  width:68px;height:68px;
  background:linear-gradient(135deg,var(--green-600),var(--green-500));
  border-radius:20px;margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;font-size:34px;
  box-shadow:0 4px 20px rgba(22,163,74,.4);
}
.login-title{font-size:24px;font-weight:900;color:var(--text);letter-spacing:-.03em}
.login-sub{font-size:13.5px;color:var(--text3);margin-top:4px}
.login-btn{
  width:100%;padding:13px;border-radius:var(--r);
  background:linear-gradient(135deg,var(--green-600),var(--green-500));
  color:#fff;border:none;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .2s;
  box-shadow:0 2px 8px rgba(22,163,74,.35);
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:6px;
}
.login-btn:hover{background:linear-gradient(135deg,var(--green-700),var(--green-600));box-shadow:0 4px 16px rgba(22,163,74,.45)}
.login-btn:active{transform:scale(.98)}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-demo{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:13px 15px;margin-top:20px;
}
.login-demo-title{font-size:11.5px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.login-demo-row{font-size:12.5px;color:var(--text3);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.login-demo-row code{background:var(--surface3);padding:1px 6px;border-radius:4px;font-size:11.5px;color:var(--text2);font-weight:600}
.login-error{
  background:var(--red-50);border:1px solid #fecaca;border-radius:var(--r-sm);
  padding:10px 13px;color:var(--red-600);font-size:13px;font-weight:600;
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
[data-theme="dark"] .login-error{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:#fca5a5}

/* ═══════════════════════════════════════════
   OFFLINE BANNER
═══════════════════════════════════════════ */
.offline-banner{
  background:linear-gradient(90deg,#92400e,#b45309);color:#fef3c7;
  text-align:center;padding:9px 16px;font-size:12.5px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;
}

/* ═══════════════════════════════════════════
   BOTTOM NAV (mobile)
═══════════════════════════════════════════ */
.bottom-nav{
  display:none;background:var(--surface);
  border-top:1px solid var(--border);
  flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,4px);
}
.bottom-nav-inner{display:flex;justify-content:space-around}
.bnav{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:7px 10px;border:none;background:none;cursor:pointer;
  color:var(--text3);font-size:9.5px;font-weight:600;
  border-radius:var(--r-sm);transition:color .15s;min-width:50px;
}
.bnav.active{color:var(--brand)}
.bnav-icon{font-size:20px;line-height:1;margin-bottom:1px}
.bnav-bar{width:18px;height:3px;border-radius:99px;background:var(--brand);margin:1px auto 0;transition:opacity .15s}
.bnav.active .bnav-bar{opacity:1}
.bnav:not(.active) .bnav-bar{opacity:0}

/* ═══════════════════════════════════════════
   CONFIRM DIALOG
═══════════════════════════════════════════ */
.confirm-icon{
  width:52px;height:52px;border-radius:16px;
  background:var(--red-50);border:1px solid #fecaca;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;margin:0 auto 14px;
}
.confirm-title{font-size:16px;font-weight:800;color:var(--text);text-align:center;margin-bottom:8px}
.confirm-msg{font-size:13.5px;color:var(--text2);text-align:center;line-height:1.6}

/* ═══════════════════════════════════════════
   SIDEBAR OVERLAY (mobile)
═══════════════════════════════════════════ */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;animation:fadeIn .2s}
.sb-overlay.show{display:block}

/* ═══════════════════════════════════════════
   PROFILE PAGE
═══════════════════════════════════════════ */
.profile-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:24px;max-width:480px;
  box-shadow:var(--shadow-xs);margin-bottom:16px;
}
.profile-avatar-wrap{display:flex;align-items:center;gap:18px;margin-bottom:20px}
.profile-avatar{
  width:64px;height:64px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:900;color:#fff;flex-shrink:0;
  box-shadow:var(--shadow);
}
.profile-name{font-size:20px;font-weight:800;color:var(--text);margin-bottom:5px}
.profile-meta{font-size:12px;color:var(--text3);margin-top:4px}

/* ═══════════════════════════════════════════
   DIVIDER
═══════════════════════════════════════════ */
.divider{height:1px;background:var(--border);margin:20px 0}

/* ═══════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════ */
.text-brand{color:var(--brand)}
.text-red{color:var(--red-500)}
.text-muted{color:var(--text3)}
.text-bold{font-weight:700}
.text-right{text-align:right}
.flex{display:flex}.items-center{align-items:center}.gap-2{gap:8px}.gap-1{gap:4px}
.fw{font-weight:700}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media(max-width:768px){
  .sidebar{position:fixed;top:0;bottom:0;left:0;transform:translateX(-100%);transition:transform .3s cubic-bezier(.22,1,.36,1)}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:flex!important}
  .page{padding:16px;padding-bottom:76px}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
  .stat-card{padding:15px}
  .stat-card-icon{width:38px;height:38px;font-size:19px;margin-bottom:10px}
  .stat-card-value{font-size:17px}
  .hide-mobile{display:none!important}
  .section-top{flex-direction:column}
  .section-actions{width:100%}
  .search-input{min-width:unset;flex:1}
  .bottom-nav{display:block}
  .topbar{padding:0 14px;height:54px}
  .field-row{grid-template-columns:1fr}
  .modal-body{padding:16px}
  .modal-header{padding:16px 16px 14px}
  .modal-footer{padding:12px 16px}
}
@media(min-width:769px){.show-mobile{display:none!important}}

@media print{
  .shell,.topbar,.sidebar,.bottom-nav,.modal-footer{display:none!important}
  .receipt{box-shadow:none;border:none;margin:0}
}

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
'use strict';
const {useState,useEffect,useMemo,useCallback,useRef,createElement:h,Fragment}=React;

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
const fmt=n=>(n||n===0)?"TZS "+Number(n).toLocaleString("sw-TZ"):"—";
const fmtN=n=>Number(n||0).toLocaleString("sw-TZ");
const today=()=>new Date().toISOString().split("T")[0];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const pct=(a,b)=>b?Math.min(100,Math.round((a/b)*100)):0;
const clsx=(...args)=>args.filter(Boolean).join(" ");

const LS={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

// ══════════════════════════════════════════
// SEED DATA
// ══════════════════════════════════════════
const SEED_USERS=[
  {id:"admin",jina:"Meneja",nywila:"admin123",role:"admin"},
  {id:"karani",jina:"Karani",nywila:"karani123",role:"karani"}
];
const SEED_STOKI=[
  {id:"s1",bidhaa:"Chrisp",idadi:100,bei_nun:500,bei_uuz:700,min:20,kat:"Vitafunio"},
  {id:"s2",bidhaa:"Mimi",idadi:300,bei_nun:100,bei_uuz:150,min:50,kat:"Vitafunio"},
  {id:"s3",bidhaa:"Min Cranch",idadi:120,bei_nun:100,bei_uuz:150,min:30,kat:"Vitafunio"},
  {id:"s4",bidhaa:"Ice Meant",idadi:100,bei_nun:100,bei_uuz:150,min:20,kat:"Pipi"},
  {id:"s5",bidhaa:"Big Bom",idadi:48,bei_nun:250,bei_uuz:350,min:10,kat:"Pipi"},
  {id:"s6",bidhaa:"Zuri Pop",idadi:50,bei_nun:200,bei_uuz:280,min:10,kat:"Pipi"},
  {id:"s7",bidhaa:"Counta",idadi:6,bei_nun:1500,bei_uuz:2000,min:5,kat:"Vifaa"},
  {id:"s8",bidhaa:"Socks",idadi:12,bei_nun:1000,bei_uuz:1500,min:5,kat:"Mavazi"},
  {id:"s9",bidhaa:"Biskut",idadi:24,bei_nun:500,bei_uuz:700,min:10,kat:"Chakula"},
  {id:"s10",bidhaa:"Nail Cut",idadi:12,bei_nun:1000,bei_uuz:1500,min:5,kat:"Vifaa"},
];
const SEED_DATA={mauzo:[],manunuzi:[],madeniKudai:[],madeniKulipa:[]};

// ══════════════════════════════════════════
// TOAST SYSTEM
// ══════════════════════════════════════════
let _addToast=null;
function ToastProvider(){
  const [list,setList]=useState([]);
  _addToast=(msg,type="success")=>{
    const id=uid();
    setList(l=>[...l.slice(-3),{id,msg,type}]);
    setTimeout(()=>setList(l=>l.filter(t=>t.id!==id)),3500);
  };
  const icons={success:"✓",error:"✕",info:"ℹ",warning:"⚠"};
  return h("div",{className:"toast-stack"},
    ...list.map(t=>h("div",{key:t.id,className:`toast ${t.type}`},
      h("span",{style:{fontSize:14}},icons[t.type]),t.msg
    ))
  );
}
const toast=(msg,type)=>_addToast&&_addToast(msg,type);

// ══════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════
function Modal({title,onClose,footer,children,wide}){
  useEffect(()=>{
    const prev=document.body.style.overflow;
    document.body.style.overflow="hidden";
    const esc=e=>{if(e.key==="Escape")onClose()};
    window.addEventListener("keydown",esc);
    return()=>{document.body.style.overflow=prev;window.removeEventListener("keydown",esc)};
  },[]);
  return h("div",{className:"overlay",onClick:e=>{if(e.target===e.currentTarget)onClose()}},
    h("div",{className:"modal",style:wide?{maxWidth:600}:{}},
      h("div",{className:"modal-header"},
        h("span",{className:"modal-title"},title),
        h("button",{className:"close-btn",onClick:onClose},"✕")
      ),
      h("div",{className:"modal-body"},children),
      footer&&h("div",{className:"modal-footer"},footer)
    )
  );
}

// ══════════════════════════════════════════
// CONFIRM
// ══════════════════════════════════════════
function Confirm({msg,onOk,onCancel}){
  return h(Modal,{title:"Thibitisha",onClose:onCancel,
    footer:h(Fragment,null,
      h("button",{className:"btn btn-secondary",onClick:onCancel},"Ghairi"),
      h("button",{className:"btn btn-danger",onClick:onOk},"🗑 Futa")
    )},
    h("div",{className:"confirm-icon"},"🗑"),
    h("div",{className:"confirm-title"},"Una uhakika?"),
    h("div",{className:"confirm-msg"},msg||"Hatua hii haiwezi kugeuzwa.")
  );
}

// ══════════════════════════════════════════
// FIELD
// ══════════════════════════════════════════
function Field({label,children,hint,error}){
  return h("div",{className:"field"},
    label&&h("label",{className:"field-label"},label),
    children,
    hint&&h("div",{className:"field-hint"},hint),
    error&&h("div",{className:"field-error"},"⚠ ",error)
  );
}
function Row({children}){return h("div",{className:"field-row"},children)}
function Inp({value,onChange,type="text",...rest}){
  return h("input",{className:"field-input",value:value||"",onChange:e=>onChange(e.target.value),type,...rest});
}
function Sel({value,onChange,children}){
  return h("select",{className:"field-input",value:value||"",onChange:e=>onChange(e.target.value)},children);
}

// ══════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════
function Search({value,onChange,placeholder="Tafuta..."}){
  return h("div",{className:"search"},
    h("span",{className:"search-icon"},"🔍"),
    h("input",{className:"search-input",value,onChange:e=>onChange(e.target.value),placeholder})
  );
}

// ══════════════════════════════════════════
// BADGE
// ══════════════════════════════════════════
function Badge({color,children}){return h("span",{className:`badge badge-${color}`},children)}

// ══════════════════════════════════════════
// EMPTY
// ══════════════════════════════════════════
function Empty({emoji="📭",title="Hakuna data",sub,action}){
  return h("div",{className:"empty"},
    h("div",{className:"empty-emoji"},emoji),
    h("div",{className:"empty-title"},title),
    sub&&h("div",{className:"empty-sub"},sub),
    action&&h("div",{style:{marginTop:18}},action)
  );
}

// ══════════════════════════════════════════
// RECEIPT MODAL
// ══════════════════════════════════════════
function ReceiptModal({sale,onClose}){
  const d=new Date(sale.tarehe).toLocaleDateString("sw-TZ",{day:"numeric",month:"long",year:"numeric"});
  return h(Modal,{title:"Risiti ya Mauzo",onClose,
    footer:h(Fragment,null,
      h("button",{className:"btn btn-secondary",onClick:onClose},"Funga"),
      h("button",{className:"btn btn-primary",onClick:()=>{window.print();toast("Inachapisha...")}},"🖨 Chapisha Risiti")
    )},
    h("div",{className:"receipt"},
      h("div",{className:"receipt-header"},
        h("div",{className:"receipt-shop"},"🏪 MFUMO WA DUKA"),
        h("div",{style:{fontSize:11,marginTop:2,color:"#555"}},"Risiti ya Mauzo")
      ),
      h("div",{className:"receipt-row"},h("span",null,"Tarehe:"),h("span",null,d)),

// LOGIN
// ══════════════════════════════════════════
function Login({onLogin}){
  const [id,setId]=useState("");
  const [pwd,setPwd]=useState("");
  const [showPwd,setShowPwd]=useState(false);
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  function attempt(){
    if(!id.trim()||!pwd){setErr("Jaza sehemu zote ili uendelee");return}
    setLoading(true);setErr("");
    setTimeout(()=>{
      const users=LS.get("duka_users")||SEED_USERS;
      const u=users.find(x=>x.id===id.trim()&&x.nywila===pwd);
      setLoading(false);
      if(u)onLogin(u);
      else setErr("Jina la mtumiaji au nywila si sahihi. Jaribu tena.");
    },500);
  }

  return h("div",{className:"login-bg"},
    h("div",{className:"login-card"},
      h("div",{className:"login-logo"},
        h("div",{className:"login-logo-wrap"},"🏪"),
        h("div",{className:"login-title"},"Mfumo wa Duka"),
        h("div",{className:"login-sub"},"Ingia ili kuendelea kusimamia biashara yako")
      ),
      err&&h("div",{className:"login-error"},"⚠ ",err),
      h(Field,{label:"Jina la Mtumiaji"},
        h(Inp,{value:id,onChange:setId,placeholder:"Andika ID yako...",autoComplete:"username",onKeyDown:e=>e.key==="Enter"&&attempt()})
      ),
      h(Field,{label:"Nywila"},
        h("div",{style:{position:"relative"}},
          h("input",{className:"field-input",type:showPwd?"text":"password",value:pwd,onChange:e=>setPwd(e.target.value),placeholder:"••••••••",style:{paddingRight:44},autoComplete:"current-password",onKeyDown:e=>e.key==="Enter"&&attempt()}),
          h("button",{onClick:()=>setShowPwd(v=>!v),style:{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",border:"none",background:"none",cursor:"pointer",fontSize:18,color:"var(--text3)",lineHeight:1}},showPwd?"🙈":"👁️")
        )
      ),
      h("button",{className:"login-btn",onClick:attempt,disabled:loading},
        loading?h(Fragment,null,"⏳ Inaingia..."):"Ingia kwenye Mfumo →"
      ),
      h("div",{className:"login-demo"},
        h("div",{className:"login-demo-title"},"Akaunti za Majaribio"),
        h("div",{className:"login-demo-row"},"👑 Meneja:",h("code",null,"admin"),"/",h("code",null,"admin123")),
        h("div",{className:"login-demo-row"},"📋 Karani:",h("code",null,"karani"),"/",h("code",null,"karani123"))
      )
    )
  );
}

function Dashboard({data,stoki}){
  const mauzo=data.mauzo||[];
  const manunuzi=data.manunuzi||[];
  const kudai=data.madeniKudai||[];
  const kulipa=data.madeniKulipa||[];

  const s={
    mauzoJumla:mauzo.reduce((a,r)=>a+(+r.jumla||0),0),
    faidaJumla:mauzo.reduce((a,r)=>a+(+r.faida||0),0),
    mauzoCount:mauzo.length,
    manunuziJumla:manunuzi.reduce((a,r)=>a+(+r.jumla||0),0),
    usafiriJumla:manunuzi.reduce((a,r)=>a+(+r.usafiri||0),0),
    hasaraJumla:manunuzi.reduce((a,r)=>a+(+r.hasara||0),0),
    kudaiDue:kudai.filter(r=>r.status!=="Amelipa").reduce((a,r)=>a+(+r.kiasi||0),0),
    kulipaKudai:kulipa.filter(r=>r.status!=="Tumelipa").reduce((a,r)=>a+(+r.kiasi||0),0),
    stokiThamani:(stoki||[]).reduce((a,r)=>a+(+r.idadi||0)*(+r.bei_nun||0),0),
    stokiChini:(stoki||[]).filter(r=>r.idadi>0&&r.idadi<=r.min).length,
    stokiKwisha:(stoki||[]).filter(r=>r.idadi===0).length,
  };

  // 7-day chart
  const chartData=useMemo(()=>
    Array.from({length:7},(_,i)=>{
      const d=new Date();d.setDate(d.getDate()-(6-i));
      const k=d.toISOString().split("T")[0];
      const label=d.toLocaleDateString("sw-TZ",{weekday:"short"});
      return{
        label,
        mauzo:mauzo.filter(m=>m.tarehe===k).reduce((a,r)=>a+(+r.jumla||0),0),
        faida:mauzo.filter(m=>m.tarehe===k).reduce((a,r)=>a+(+r.faida||0),0),
      };
    })
  ,[mauzo]);

  const chartMax=Math.max(...chartData.map(d=>d.mauzo),1);

  const CARDS=[
    {icon:"🛒",label:"Jumla Mauzo",value:fmt(s.mauzoJumla),sub:`Biashara ${s.mauzoCount}`,color:"#16a34a",bg:"#dcfce7",key:"m"},
    {icon:"💰",label:"Faida Halisi",value:fmt(s.faidaJumla),sub:"Baada ya gharama",color:"#d97706",bg:"#fef3c7",key:"f"},
    {icon:"📤",label:"Madeni Kudai",value:fmt(s.kudaiDue),sub:"Wateja wanaodaiwa",color:"#2563eb",bg:"#dbeafe",key:"k"},
    {icon:"📥",label:"Madeni Kulipa",value:fmt(s.kulipaKudai),sub:"Tunaodaiwa",color:"#dc2626",bg:"#fee2e2",key:"kp"},
    {icon:"📦",label:"Thamani Stoki",value:fmt(s.stokiThamani),sub:"Mtaji dukani",color:"#9333ea",bg:"#f3e8ff",key:"st"},
    {icon:"🚗",label:"Gharama Usafiri",value:fmt(s.usafiriJumla),sub:"Jumla usafirishaji",color:"#0891b2",bg:"#cffafe",key:"u"},
    {icon:"⚠️",label:"Hasara / Uharibifu",value:fmt(s.hasaraJumla),sub:"Jumla hasara",color:"#dc2626",bg:"#fee2e2",key:"h"},
    {icon:"🔴",label:"Stoki Tatizo",value:`${s.stokiChini+s.stokiKwisha} bidhaa`,sub:`${s.stokiKwisha} imeisha, ${s.stokiChini} chini`,color:"#dc2626",bg:"#fee2e2",key:"sc"},
  ];

  const stokiAlert=(stoki||[]).filter(r=>r.idadi<=r.min);

  return h("div",{className:"anim-up"},
    h("div",{className:"stats-grid"},
      ...CARDS.map(c=>h("div",{key:c.key,className:"stat-card"},
        h("div",{className:"stat-card-icon",style:{background:c.bg}},c.icon),
        h("div",{className:"stat-card-label"},c.label),
        h("div",{className:"stat-card-value"},c.value),
        h("div",{className:"stat-card-sub"},c.sub)
      ))
    ),

    // Chart
    h("div",{className:"chart-card"},
      h("div",{className:"chart-header"},
        h("div",null,
          h("div",{className:"chart-title"},"📈 Mwenendo wa Mauzo"),
          h("div",{className:"chart-sub"},"Siku 7 zilizopita")
        ),
        h("div",{className:"chart-legend"},
          h("div",{className:"legend-dot",style:{background:"var(--brand)"}}),
          h("div",{className:"legend-label"},"Mauzo"),
          h("div",{className:"legend-dot",style:{background:"#f59e0b",marginLeft:8}}),
          h("div",{className:"legend-label"},"Faida")
        )
      ),
      chartData.every(d=>d.mauzo===0)
        ?h("div",{style:{height:110,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text3)",fontSize:13}},"Hakuna mauzo wiki hii. Anza kurekodi!")
        :h("div",{className:"bars"},
          ...chartData.map((d,i)=>{
            const h100=110;
            const bh=Math.max(4,Math.round(pct(d.mauzo,chartMax)/100*h100));
            const fh=d.mauzo>0?Math.max(2,Math.round(pct(d.faida,d.mauzo)/100*bh)):0;
            return h("div",{key:i,className:"bar-col"},
              h("div",{className:"bar-val",style:{fontSize:8}},d.mauzo>0?fmt(d.mauzo).replace("TZS ",""):""),
              h("div",{style:{flex:1,display:"flex",flexDirection:"column",justifyContent:"flex-end",width:"100%"}},
                h("div",{className:"bar-body",title:`${d.label}\nMauzo: ${fmt(d.mauzo)}\nFaida: ${fmt(d.faida)}`,
                  style:{height:bh,background:d.mauzo>0?"var(--brand)":"var(--border)",opacity:d.mauzo>0?1:.4,position:"relative"}},
                  fh>2&&h("div",{style:{position:"absolute",bottom:0,left:0,right:0,height:fh,background:"#f59e0b",borderRadius:"5px 5px 0 0",opacity:.85}})
                )
              ),
              h("div",{className:"bar-label"},d.label)
            );
          })
        )
    ),

    // Alert table
    stokiAlert.length>0&&h("div",{className:"table-card"},
      h("div",{style:{padding:"14px 20px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:10}},
        h("div",{style:{width:28,height:28,borderRadius:8,background:stokiAlert.filter(r=>r.idadi===0).length>0?"var(--red-50)":"var(--amber-50)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}},
          stokiAlert.filter(r=>r.idadi===0).length>0?"🔴":"⚠️"
        ),
        h("div",null,
          h("div",{style:{fontSize:14,fontWeight:700,color:"var(--text)"}},`Bidhaa ${stokiAlert.length} Zinahitaji Kujazwa`),
          h("div",{style:{fontSize:11,color:"var(--text3)",marginTop:1}},"Tembelea ukurasa wa Stoki kuchukua hatua")
        )
      ),
      h("table",null,
        h("thead",null,h("tr",null,h("th",null,"Bidhaa"),h("th",null,"Kategoria"),h("th",null,"Iliyobaki"),h("th",null,"Kiwango Chini"),h("th",null,"Hali"))),
        h("tbody",null,...stokiAlert.map(r=>h("tr",{key:r.id},
          h("td",null,h("b",null,r.bidhaa)),
          h("td",null,h("span",{className:"td-muted"},r.kat||"—")),
          h("td",{className:"td-right"},h("b",{style:{color:r.idadi===0?"var(--red-500)":"var(--amber-600)"}},fmtN(r.idadi))),
          h("td",{className:"td-right td-muted"},fmtN(r.min)),
          h("td",null,r.idadi===0?h(Badge,{color:"red"},"Imeisha"):h(Badge,{color:"amber"},"Stoki Chini"))
        )))
      )
    )
  );
}

// MAUZO
// ══════════════════════════════════════════
function Mauzo({data,patchData,stoki,patchStoki,user}){
  const [q,setQ]=useState("");
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [receipt,setReceipt]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const isAdmin=user.role==="admin";

  const rows=useMemo(()=>{
    const lq=q.toLowerCase();
    return(data.mauzo||[]).filter(r=>!lq||r.bidhaa?.toLowerCase().includes(lq)||r.tarehe?.includes(lq));
  },[data.mauzo,q]);

  const totals={jumla:rows.reduce((a,r)=>a+(+r.jumla||0),0),faida:rows.reduce((a,r)=>a+(+r.faida||0),0)};

  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const jumla=(+form.idadi||0)*(+form.bei_uuz||0);
  const faida=jumla-(+form.idadi||0)*(+form.bei_nun||0);

  function openAdd(){setForm({tarehe:today(),bidhaa:"",idadi:"",bei_uuz:"",bei_nun:""});setModal("add")}
  function openEdit(r){setForm({...r});setModal("edit")}
  function onBidhaaChange(v){
    const item=stoki.find(s=>s.bidhaa===v);
    sf("bidhaa",v);
    if(item){sf("bei_uuz",item.bei_uuz);sf("bei_nun",item.bei_nun)}
  }
  function save(){
    if(!form.bidhaa||!form.idadi||!form.bei_uuz)return toast("Jaza sehemu zote","error");
    if(modal==="add"){
      const item=stoki.find(s=>s.bidhaa===form.bidhaa);
      if(item&&+form.idadi>item.idadi)return toast(`Stoki haitoshi! Iliyobaki: ${item.idadi}`,"error");
      const rec={...form,id:uid(),jumla,faida,iliyoandikwa_na:user.jina};
      patchData(p=>({...p,mauzo:[...(p.mauzo||[]),rec]}));
      if(item)patchStoki(p=>p.map(s=>s.bidhaa===form.bidhaa?{...s,idadi:s.idadi-(+form.idadi)}:s));
      toast("Mauzo yameandikwa ✓");
      setModal(null);setTimeout(()=>setReceipt(rec),300);
    }else{
      patchData(p=>({...p,mauzo:(p.mauzo||[]).map(r=>r.id===form.id?{...form,jumla,faida}:r)}));
      toast("Imesasishwa ✓");setModal(null);
    }
  }
  function del(r){
    setConfirm({msg:`Futa mauzo ya "${r.bidhaa}" (${fmt(r.jumla)})?`,onOk:()=>{
      patchData(p=>({...p,mauzo:(p.mauzo||[]).filter(x=>x.id!==r.id)}));
      toast("Imefutwa");setConfirm(null);
    }});
  }
  const canAct=r=>isAdmin||r.iliyoandikwa_na===user.jina;

  return h("div",{className:"anim-up"},
    h("div",{className:"section-top"},
      h("div",{className:"section-title-block"},
        h("h2",null,"🛒 Mauzo"),
        h("p",null,`Rekodi ${rows.length} • Jumla ${fmt(totals.jumla)}`)
      ),
      h("div",{className:"section-actions"},
        h(Search,{value:q,onChange:setQ}),
        h("button",{className:"btn btn-primary",onClick:openAdd},"+ Ongeza Uuzaji")
      )
    ),

    // Desktop table
    h("div",{className:"table-card hide-mobile"},
      h("table",null,
        h("thead",null,h("tr",null,
          ["Tarehe","Bidhaa","Idadi","Bei Uuzaji","Gharama","Jumla","Faida","Aliandika","Vitendo"].map(c=>h("th",{key:c},c))
        )),
        h("tbody",null,
          !rows.length&&h("tr",null,h("td",{colSpan:9,style:{padding:0}},h(Empty,{emoji:"🛒",title:"Hakuna mauzo bado",sub:"Bonyeza '+ Ongeza Uuzaji' kuanza"}))),
          ...rows.map(r=>h("tr",{key:r.id},
            h("td",null,h("span",{className:"td-muted"},r.tarehe)),
            h("td",null,h("b",null,r.bidhaa)),
            h("td",{className:"td-right td-mono"},fmtN(r.idadi)),
            h("td",{className:"td-right"},fmt(r.bei_uuz)),
            h("td",{className:"td-right td-muted"},fmt(r.bei_nun)),
            h("td",{className:"td-right fw"},fmt(r.jumla)),
            h("td",{className:"td-right"},h("span",{style:{color:r.faida>=0?"var(--brand)":"var(--red-500)",fontWeight:700}},fmt(r.faida))),
            h("td",null,h("span",{className:"td-muted"},r.iliyoandikwa_na||"—")),
            h("td",null,h("div",{style:{display:"flex",gap:5,justifyContent:"flex-end"}},
              h("button",{className:"btn btn-ghost btn-sm btn-icon",onClick:()=>setReceipt(r),title:"Risiti"},"🧾"),
              canAct(r)&&h("button",{className:"btn btn-info btn-sm btn-icon",onClick:()=>openEdit(r),title:"Hariri"},"✏️"),
              canAct(r)&&h("button",{className:"btn btn-danger btn-sm btn-icon",onClick:()=>del(r),title:"Futa"},"🗑")
            ))
          ))
        ),
        rows.length>0&&h("tfoot",null,h("tr",null,
          h("td",{colSpan:5},"Jumla Yote"),
          h("td",{className:"td-right"},fmt(totals.jumla)),
          h("td",{className:"td-right",style:{color:"var(--brand)"}},fmt(totals.faida)),
          h("td",{colSpan:2})
        ))
      )
    ),

    // Mobile cards
    h("div",{className:"show-mobile"},
      !rows.length&&h(Empty,{emoji:"🛒",title:"Hakuna mauzo bado"}),
      ...rows.map(r=>h("div",{key:r.id,className:"m-card"},
        h("div",{className:"m-card-head"},
          h("div",null,h("div",{className:"m-card-title"},r.bidhaa),h("div",{className:"m-card-sub"},r.tarehe)),
          h(Badge,{color:r.faida>=0?"green":"red"},r.faida>=0?"Faida":"Hasara")
        ),
        h("div",{className:"m-card-grid"},
          h("div",{className:"m-card-field"},h("div",{className:"m-card-field-label"},"Idadi"),h("div",{className:"m-card-field-value"},fmtN(r.idadi))),
          h("div",{className:"m-card-field"},h("div",{className:"m-card-field-label"},"Bei"),h("div",{className:"m-card-field-value"},fmt(r.bei_uuz))),
          h("div",{className:"m-card-field"},h("div",{className:"m-card-field-label"},"Jumla"),h("div",{className:"m-card-field-value",style:{color:"var(--brand)"}},fmt(r.jumla))),
          h("div",{className:"m-card-field"},h("div",{className:"m-card-field-label"},"Faida"),h("div",{className:"m-card-field-value",style:{color:r.faida>=0?"var(--brand)":"var(--red-500)"}},fmt(r.faida)))
        ),
        h("div",{className:"m-card-foot"},
          h("span",{className:"td-muted",style:{fontSize:11}},r.iliyoandikwa_na||""),
          h("div",{style:{display:"flex",gap:6}},
            h("button",{className:"btn btn-ghost btn-sm",onClick:()=>setReceipt(r)},"🧾"),
            canAct(r)&&h("button",{className:"btn btn-info btn-sm",onClick:()=>openEdit(r)},"✏️"),
            canAct(r)&&h("button",{className:"btn btn-danger btn-sm",onClick:()=>del(r)},"🗑")
          )
        )
      ))
    ),

    // Modal
    modal&&h(Modal,{title:modal==="add"?"Uuzaji Mpya":"Hariri Uuzaji",onClose:()=>setModal(null),
      footer:h(Fragment,null,h("button",{className:"btn btn-secondary",onClick:()=>setModal(null)},"Ghairi"),h("button",{className:"btn btn-primary",onClick:save},modal==="add"?"Hifadhi Uuzaji":"Sasisha"))},
      h(Field,{label:"Tarehe"},h(Inp,{type:"date",value:form.tarehe,onChange:v=>sf("tarehe",v)})),
      h(Field,{label:"Bidhaa"},
        h(Sel,{value:form.bidhaa,onChange:onBidhaaChange},
          h("option",{value:""},"— Chagua bidhaa —"),
          ...stoki.map(s=>h("option",{key:s.id,value:s.bidhaa,disabled:s.idadi===0},`${s.bidhaa} ${s.idadi===0?"(Imeisha)":`(Stoki: ${s.idadi})`}`))
        )
      ),
      h(Row,null,
        h(Field,{label:"Idadi"},h(Inp,{type:"number",min:1,value:form.idadi,onChange:v=>sf("idadi",v),placeholder:"0"})),
        h(Field,{label:"Bei ya Kuuzia (TZS)"},h(Inp,{type:"number",value:form.bei_uuz,onChange:v=>sf("bei_uuz",v),placeholder:"0"}))
      ),
      h(Field,{label:"Bei ya Kununulia / Gharama (TZS)",hint:"Inatumika kukokotoa faida"},
        h(Inp,{type:"number",value:form.bei_nun,onChange:v=>sf("bei_nun",v),placeholder:"0"})
      ),
      (form.idadi&&form.bei_uuz)&&h("div",{className:"calc-box"},
        h("div",{className:"calc-item"},"Jumla: ",h("strong",null,fmt(jumla))),
        h("div",{className:clsx("calc-item",faida>=0?"profit":"loss")},"Faida: ",h("strong",null,fmt(faida)))
      )
    ),
    receipt&&h(ReceiptModal,{sale:receipt,onClose:()=>setReceipt(null)}),
    confirm&&h(Confirm,{...confirm,onCancel:()=>setConfirm(null)})
  );
}

// MANUNUZI
// ══════════════════════════════════════════
function Manunuzi({data,patchData,stoki,patchStoki,user}){
  const [q,setQ]=useState("");
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [confirm,setConfirm]=useState(null);
  const isAdmin=user.role==="admin";

  const rows=useMemo(()=>{
    const lq=q.toLowerCase();
    return(data.manunuzi||[]).filter(r=>!lq||r.bidhaa?.toLowerCase().includes(lq)||r.tarehe?.includes(lq));
  },[data.manunuzi,q]);

  const totals={jumla:rows.reduce((a,r)=>a+(+r.jumla||0),0),usafiri:rows.reduce((a,r)=>a+(+r.usafiri||0),0),hasara:rows.reduce((a,r)=>a+(+r.hasara||0),0)};
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const jumla=(+form.idadi||0)*(+form.bei||0);

  function openAdd(){setForm({tarehe:today(),bidhaa:"",idadi:"",bei:"",usafiri:"",hasara:""});setModal("add")}
  function openEdit(r){setForm({...r});setModal("edit")}
  function save(){
    if(!form.bidhaa||!form.idadi||!form.bei)return toast("Jaza sehemu zote","error");
    if(modal==="add"){
      const rec={...form,id:uid(),jumla,iliyoandikwa_na:user.jina};
      patchData(p=>({...p,manunuzi:[...(p.manunuzi||[]),rec]}));
      const item=stoki.find(s=>s.bidhaa===form.bidhaa);
      if(item)patchStoki(p=>p.map(s=>s.bidhaa===form.bidhaa?{...s,idadi:s.idadi+(+form.idadi),bei_nun:+form.bei}:s));
      else patchStoki(p=>[...p,{id:uid(),bidhaa:form.bidhaa,idadi:+form.idadi,bei_nun:+form.bei,bei_uuz:0,min:10,kat:"Nyingine"}]);
      toast("Ununuzi umeandikwa ✓");
    }else{
      patchData(p=>({...p,manunuzi:(p.manunuzi||[]).map(r=>r.id===form.id?{...form,jumla}:r)}));
      toast("Imesasishwa ✓");
    }
    setModal(null);

  const [form,setForm]=useState({});
  const [confirm,setConfirm]=useState(null);

  const rows=useMemo(()=>{
    const lq=q.toLowerCase();
    return(stoki||[]).filter(r=>!lq||r.bidhaa?.toLowerCase().includes(lq)||r.kat?.toLowerCase().includes(lq));
  },[stoki,q]);

  const totals={mtaji:rows.reduce((a,r)=>a+(+r.idadi||0)*(+r.bei_nun||0),0),uuzaji:rows.reduce((a,r)=>a+(+r.idadi||0)*(+r.bei_uuz||0),0)};

      if(stoki.find(s=>s.bidhaa.toLowerCase()===form.bidhaa.toLowerCase()))return toast("Bidhaa hiyo tayari ipo","error");

// WATUMIAJI
// ══════════════════════════════════════════
function Watumiaji({users,patchUsers,currentUser}){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [confirm,setConfirm]=useState(null);
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));

  function save(){
    if(modal==="add"){
      if(!form.id||!form.jina||!form.nywila)return toast("Jaza sehemu zote","error");
      if(users.find(u=>u.id===form.id))return toast("ID hiyo tayari ipo","error");
      patchUsers(p=>[...p,{id:form.id,jina:form.jina,nywila:form.nywila,role:form.role||"karani"}]);
      toast(`Mtumiaji "${form.jina}" ameongezwa ✓`);
    }else if(modal==="edit"){
      patchUsers(p=>p.map(u=>u.id===form.id?{...u,jina:form.jina,role:form.role}:u));
      toast("Imesasishwa ✓");
    }else if(modal==="pwd"){
      if(!form.mpya)return toast("Weka nywila mpya","error");
      if(form.mpya!==form.thibiti)return toast("Nywila hazifanani","error");
      const tgt=users.find(u=>u.id===form.id);
      if(currentUser.role!=="admin"&&tgt.nywila!==form.zamani)return toast("Nywila ya zamani si sahihi","error");
      patchUsers(p=>p.map(u=>u.id===form.id?{...u,nywila:form.mpya}:u));
      toast("Nywila imebadilishwa ✓");
    }
    setModal(null);
  }
  function del(u){
    setConfirm({msg:`Futa mtumiaji "${u.jina}"?`,onOk:()=>{
      patchUsers(p=>p.filter(x=>x.id!==u.id));
      toast("Mtumiaji amefutwa");setConfirm(null);
    }});
  }

  return h("div",{className:"anim-up"},
    h("div",{className:"section-top"},
      h("div",{className:"section-title-block"},h("h2",null,"👥 Usimamizi wa Watumiaji"),h("p",null,`Watumiaji ${users.length}`)),
      h("button",{className:"btn btn-primary",onClick:()=>{setForm({id:"",jina:"",nywila:"",role:"karani"});setModal("add")}},"+ Ongeza Mtumiaji")
    ),
    h("div",{className:"table-card"},
      h("table",null,
        h("thead",null,h("tr",null,h("th",null,"ID / Jina"),h("th",null,"Nafasi"),h("th",null,"Vitendo"))),
        h("tbody",null,...users.map(u=>h("tr",{key:u.id},
          h("td",null,
            h("div",{style:{display:"flex",alignItems:"center",gap:10}},
              h("div",{style:{width:34,height:34,borderRadius:9,background:u.role==="admin"?"var(--purple-100)":"var(--blue-100)",color:u.role==="admin"?"var(--purple-600)":"var(--blue-600)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,flexShrink:0}},u.jina[0].toUpperCase()),
              h("div",null,
                h("div",{style:{fontWeight:700,fontSize:14}},u.jina,u.id===currentUser.id&&h("span",{style:{marginLeft:6,fontSize:11,color:"var(--brand)",fontWeight:700}},"(Mimi)")),
                h("div",{style:{fontSize:12,color:"var(--text3)",fontFamily:"monospace"}},u.id)
              )
            )
          ),
          h("td",null,h(Badge,{color:u.role==="admin"?"purple":"blue"},u.role==="admin"?"👑 Meneja":"📋 Karani")),
          h("td",null,h("div",{style:{display:"flex",gap:6,justifyContent:"flex-end"}},
            h("button",{className:"btn btn-info btn-sm",onClick:()=>{setForm({...u});setModal("edit")}},"✏️ Hariri"),
            h("button",{className:"btn btn-secondary btn-sm",onClick:()=>{setForm({id:u.id,zamani:"",mpya:"",thibiti:""});setModal("pwd")}},"🔑 Nywila"),
            u.id!==currentUser.id&&h("button",{className:"btn btn-danger btn-sm",onClick:()=>del(u)},"🗑")
          ))
        )))
      )
    ),
    modal==="add"&&h(Modal,{title:"Mtumiaji Mpya",onClose:()=>setModal(null),
      footer:h(Fragment,null,h("button",{className:"btn btn-secondary",onClick:()=>setModal(null)},"Ghairi"),h("button",{className:"btn btn-primary",onClick:save},"Ongeza"))},
      h(Row,null,
        h(Field,{label:"ID ya Kuingia",hint:"Herufi ndogo, bila nafasi"},h(Inp,{value:form.id,onChange:v=>sf("id",v.toLowerCase().replace(/\s/g,"")),placeholder:"mfano: salma"})),
        h(Field,{label:"Jina Kamili"},h(Inp,{value:form.jina,onChange:v=>sf("jina",v),placeholder:"Salma Hassan"}))
      ),
      h(Row,null,
        h(Field,{label:"Nywila"},h("input",{className:"field-input",type:"password",value:form.nywila||"",onChange:e=>sf("nywila",e.target.value),placeholder:"••••••••"})),
        h(Field,{label:"Nafasi"},h(Sel,{value:form.role,onChange:v=>sf("role",v)},h("option",{value:"karani"},"📋 Karani"),h("option",{value:"admin"},"👑 Meneja/Admin")))
      )
    ),
    modal==="edit"&&h(Modal,{title:"Hariri Mtumiaji",onClose:()=>setModal(null),
      footer:h(Fragment,null,h("button",{className:"btn btn-secondary",onClick:()=>setModal(null)},"Ghairi"),h("button",{className:"btn btn-primary",onClick:save},"Sasisha"))},
      h(Field,{label:"Jina Kamili"},h(Inp,{value:form.jina,onChange:v=>sf("jina",v)})),
      h(Field,{label:"Nafasi"},h(Sel,{value:form.role,onChange:v=>sf("role",v)},h("option",{value:"karani"},"📋 Karani"),h("option",{value:"admin"},"👑 Meneja/Admin")))
    ),
    modal==="pwd"&&h(Modal,{title:"Badilisha Nywila",onClose:()=>setModal(null),
      footer:h(Fragment,null,h("button",{className:"btn btn-secondary",onClick:()=>setModal(null)},"Ghairi"),h("button",{className:"btn btn-primary",onClick:save},"Badilisha"))},
      currentUser.role!=="admin"&&h(Field,{label:"Nywila ya Zamani"},h("input",{className:"field-input",type:"password",value:form.zamani||"",onChange:e=>sf("zamani",e.target.value)})),
      h(Field,{label:"Nywila Mpya"},h("input",{className:"field-input",type:"password",value:form.mpya||"",onChange:e=>sf("mpya",e.target.value)})),
      h(Field,{label:"Thibitisha Nywila Mpya"},h("input",{className:"field-input",type:"password",value:form.thibiti||"",onChange:e=>sf("thibiti",e.target.value)}))
    ),
    confirm&&h(Confirm,{...confirm,onCancel:()=>setConfirm(null)})
  );
}

    )
  );

// EXPORT ALL
// ══════════════════════════════════════════
function exportAll(data){
  let csv="";
  const sections={Mauzo:data.mauzo,Manunuzi:data.manunuzi,"Madeni Kudai":data.madeniKudai,"Madeni Kulipa":data.madeniKulipa};
  for(const[name,rows]of Object.entries(sections)){
    csv+=`\n\n=== ${name} ===\n`;
    if(rows?.length){csv+=Object.keys(rows[0]).join(",")+"\n";csv+=rows.map(r=>Object.values(r).map(v=>`"${v}"`).join(",")).join("\n")}
    else csv+="(Hakuna data)\n";
  }
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`duka-data-${today()}.csv`;a.click();
  toast("Data yote imepakiwa ✓");
}

  {id:"home",icon:"🏠",label:"Muhtasari"},
  {id:"mauzo",icon:"🛒",label:"Mauzo"},
  {id:"manunuzi",icon:"📦",label:"Manunuzi"},

  {id:"kulipa",icon:"📥",label:"Kulipa"},
  {id:"watumiaji",icon:"👥",label:"Watumiaji",admin:true},
];
const PAGE_TITLES={home:"Muhtasari",mauzo:"Mauzo",manunuzi:"Manunuzi",stoki:"Stoki na Bidhaa",kudai:"Madeni ya Kudai",kulipa:"Madeni ya Kulipa",watumiaji:"Usimamizi wa Watumiaji",profile:"Akaunti Yangu"};

// ══════════════════════════════════════════
// ROOT APP
// ══════════════════════════════════════════
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("home");
  const [dark,setDark]=useState(false);
  const [online,setOnline]=useState(navigator.onLine);
  const [sbOpen,setSbOpen]=useState(false);

  const [data,setDataRaw]=useState(null);
  const [stoki,setStokiRaw]=useState(null);
  const [users,setUsersRaw]=useState(SEED_USERS);

  function patchData(fn){setDataRaw(p=>{const n=fn(p);LS.set("duka_data",n);return n})}
  function patchStoki(fn){setStokiRaw(p=>{const n=typeof fn==="function"?fn(p):fn;LS.set("duka_stoki",n);return n})}
  function patchUsers(fn){setUsersRaw(p=>{const n=typeof fn==="function"?fn(p):fn;LS.set("duka_users",n);return n})}

  useEffect(()=>{
    const d=LS.get("duka_data");setDataRaw(d||SEED_DATA);
    const s=LS.get("duka_stoki");setStokiRaw(s||SEED_STOKI);
    const u=LS.get("duka_users");if(u)setUsersRaw(u);
    const sess=LS.get("duka_sess");
    if(sess){const all=LS.get("duka_users")||SEED_USERS;const found=all.find(x=>x.id===sess);if(found)setUser(found)}
    const dk=LS.get("duka_dark");if(dk)setDark(true);
  },[]);

  useEffect(()=>{document.documentElement.setAttribute("data-theme",dark?"dark":"light");LS.set("duka_dark",dark)},[dark]);
  useEffect(()=>{if(user)LS.set("duka_sess",user.id)},[user]);
  useEffect(()=>{
    const on=()=>setOnline(true);const off=()=>setOnline(false);
    window.addEventListener("online",on);window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off)};
  },[]);

  if(!data||!stoki)return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,background:"var(--bg)"}},
    h("div",{style:{fontSize:52}},"🏪"),
    h("div",{style:{color:"var(--brand)",fontWeight:700,fontSize:16,letterSpacing:".02em"}},"Inapakia Mfumo...")
  );

  if(!user)return h(Fragment,null,h(ToastProvider),h(Login,{onLogin:u=>{setUser(u);setPage("home")}}));

  const isAdmin=user.role==="admin";
  const visibleNav=NAV.filter(n=>!n.admin||isAdmin);
  const mobileNav=visibleNav.slice(0,5);

  // Alerts count
  const alerts=(stoki||[]).filter(s=>s.idadi<=s.min).length;

  function logout(){LS.set("duka_sess",null);setUser(null);setPage("home")}
  function goPage(id){setPage(id);setSbOpen(false)}

  function renderPage(){
    const props={data,patchData,stoki,patchStoki,user};
    switch(page){
      case"home":return h(Dashboard,{data,stoki});
      case"mauzo":return h(Mauzo,props);
      case"manunuzi":return h(Manunuzi,props);
      case"stoki":return h(Stoki,{stoki,patchStoki,user});
      case"kudai":return h(DeniPage,{type:"madeniKudai",...props});
      case"kulipa":return h(DeniPage,{type:"madeniKulipa",...props});
      case"watumiaji":return isAdmin?h(Watumiaji,{users,patchUsers,currentUser:user}):null;
      case"profile":return h(Profile,{user,users,patchUsers});
      default:return null;
    }
  }

  return h(Fragment,null,
    h(ToastProvider),
    !online&&h("div",{className:"offline-banner"},"📵 Hakuna mtandao — Data inahifadhiwa kwenye kifaa. Utaendelea ukiungana tena."),

    h("div",{className:"shell"},
      // Sidebar overlay
      h("div",{className:clsx("sb-overlay",sbOpen&&"show"),onClick:()=>setSbOpen(false)}),

      // SIDEBAR
      h("div",{className:clsx("sidebar",sbOpen&&"open")},
        h("div",{className:"sb-brand"},
          h("div",{className:"sb-brand-icon"},"🏪"),
          h("div",null,
            h("div",{className:"sb-brand-name"},"Mfumo wa Duka"),
            h("div",{className:"sb-brand-tagline"},"Usimamizi wa Biashara")
          )
        ),
        h("div",{className:"sb-user"},
          h("div",{className:"user-row"},
            h("div",{className:"sb-avatar",style:{background:isAdmin?"#9333ea":"#2563eb"}},user.jina[0].toUpperCase()),
            h("div",{style:{flex:1,minWidth:0}},
              h("div",{className:"sb-user-name"},user.jina),
              h("div",{className:"sb-user-role"},isAdmin?"👑 Meneja":"📋 Karani"),
              h("div",{className:"sb-online"},h("div",{className:"sb-online-dot"}),h("div",{className:"sb-online-text"},online?"Mtandaoni":"Nje ya mtandao"))
            )
          )
        ),
        h("div",{className:"sb-nav"},
          h("div",{className:"sb-section-label"},"Kurasa Kuu"),
          ...visibleNav.map(n=>h("button",{key:n.id,className:clsx("nav-item",page===n.id&&"active"),onClick:()=>goPage(n.id)},
            h("div",{className:"nav-icon"},n.icon),
            h("span",{className:"nav-label"},n.label),
            n.id==="stoki"&&alerts>0&&h("span",{className:"nav-badge",style:{background:"var(--amber-500)"}},alerts)
          )),
          h("div",{className:"sb-section-label",style:{marginTop:8}},"Akaunti"),
          h("button",{className:clsx("nav-item",page==="profile"&&"active"),onClick:()=>goPage("profile")},
            h("div",{className:"nav-icon"},"⚙️"),h("span",{className:"nav-label"},"Akaunti Yangu")
          )
        ),
        h("div",{className:"sb-footer"},
          h("button",{className:"sb-footer-btn",onClick:()=>setDark(v=>!v)},dark?"☀️":"🌙","  ",dark?"Muonekano wa Mchana":"Muonekano wa Usiku"),
          h("button",{className:"sb-footer-btn",onClick:()=>exportAll(data)},"📥","  Pakua Data Yote (CSV)"),
          h("button",{className:"sb-footer-btn danger",onClick:logout},"🚪","  Toka kwenye Mfumo")
        )
      ),

      // MAIN AREA
      h("div",{className:"main-area"},
        // Top bar
        h("div",{className:"topbar"},
          h("button",{className:"icon-btn hamburger",onClick:()=>setSbOpen(v=>!v),style:{display:"none"}},"☰"),
          h("div",{className:"tb-title"},
            h("h1",null,PAGE_TITLES[page]||""),
            h("p",null,new Date().toLocaleDateString("sw-TZ",{weekday:"long",day:"numeric",month:"long",year:"numeric"}))
          ),
          h("div",{className:"tb-actions"},
            h("button",{className:"icon-btn",onClick:()=>setDark(v=>!v),title:dark?"Mwanga":"Giza"},dark?"☀️":"🌙"),
            !online&&h("span",{style:{fontSize:11,fontWeight:700,color:"var(--amber-600)",background:"var(--amber-50)",padding:"4px 9px",borderRadius:20,border:"1px solid var(--amber-200)"}},"📵 Offline")
          )
        ),

        // Page content
        h("div",{className:"page"},renderPage()),

        // Bottom nav
        h("div",{className:"bottom-nav"},
          h("div",{className:"bottom-nav-inner"},
            ...mobileNav.map(n=>h("button",{key:n.id,className:clsx("bnav",page===n.id&&"active"),onClick:()=>goPage(n.id)},
              h("div",{className:"bnav-icon"},n.icon),
              n.label,
              h("div",{className:"bnav-bar"})
            ))
          )
        )
      )
    )
  );
}
